<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideoJournal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <nav>
    <div class="logo">VideoJournal</div>
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('upload')">Upload</button>
    <button onclick="showPage('dashboard')">Dashboard</button>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </nav>

  <main>
    <div class="search-container">
      <input type="text" id="globalSearch" placeholder="Search by labels, titles...">
      <button class="search-btn" onclick="handleSearch()">Search</button>
    </div>

    <section id="home-page" class="page">
      <h2>Your Journal</h2>
      <p style="color:var(--muted); font-size:13px; margin-bottom:1.5rem;">Your past entries, organized by trip.</p>
      <div id="video-feed" class="grid"></div>
    </section>

    <section id="upload-page" class="page" style="display:none;">
      <h2>Create New Journal</h2>
      <div class="card">
        <div class="mode-toggle">
          <button type="button" id="mode-upload-btn" class="mode-btn active" onclick="setMode('upload')">Upload
            File</button>
          <button type="button" id="mode-record-btn" class="mode-btn" onclick="setMode('record')">Record Video</button>
        </div>

        <form id="uploadForm">
          <div id="upload-section">
            <label>Select Video File:</label>
            <input type="file" id="videoFile" accept="video/*">
          </div>

          <div id="record-section" style="display:none;">
            <video id="preview" autoplay muted playsinline
              style="width:100%; border-radius:var(--radius); background:#000; margin-bottom:0.75rem;"></video>
            <div style="display:flex; gap:0.5rem; align-items:center; justify-content:space-between;">
              <button type="button" id="record-btn" class="mode-btn" onclick="toggleRecording()">Start
                Recording</button>
              <span id="record-timer"
                style="color:var(--muted); font-size:13px; font-variant-numeric:tabular-nums;"></span>
            </div>
            <video id="recorded-playback" controls
              style="display:none; width:100%; border-radius:var(--radius); margin-top:0.75rem;"></video>
          </div>

          <input type="text" id="videoTitle" placeholder="Give your video a title..." required>
          <textarea id="videoDesc" rows="4" placeholder="What's on your mind?"></textarea>

          <label>Location</label>
          <div style="display:flex; gap:0.5rem;">
            <input type="text" id="videoLocation" placeholder="Detecting location..." style="flex:1;">
            <button type="button" class="mode-btn" style="flex:0 0 auto; padding:10px 14px;"
              onclick="detectLocation()">Detect</button>
          </div>

          <label>Tags</label>
          <input type="text" id="tagInput" placeholder="Type a tag and press Enter" onkeydown="handleTagAdd(event)">
          <div id="tag-pills" class="tag-pills"></div>

          <button type="submit">Publish to Feed</button>
        </form>
      </div>
    </section>

    <section id="dashboard-page" class="page" style="display:none;">
      <h2>Your Insights</h2>

      <div class="card">
        <h3>Emotion Timeline</h3>
        <p style="color:var(--muted); font-size:13px; margin-bottom:1rem;">Your sentiment trends across recent journal
          entries.</p>
        <canvas id="timelineCanvas" height="100"></canvas>
      </div>

      <div class="card">
        <h3>Recent Entries</h3>
        <div id="recent-entries"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>
</body>

</html>
